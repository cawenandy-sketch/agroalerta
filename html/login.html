<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Login AgroAlerta</title>

<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

<div class="card">
    <img src="../img/logo.jpeg" alt="Logo" class="logo-login">

    <h2>Bienvenido a AgroAlerta</h2>

    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    
    <button type="button" id="btnLogin">Iniciar Sesión</button>

    <p>O si solo quieres explorar:</p>

    
    <button type="button" id="btnInvitado">Entrar como invitado</button>

    <div class="link">
        ¿No tienes cuenta?
        <a href="registro_usuario.html">Regístrate aquí</a>
    </div>

</div>

<script src="../js/login.js"></script>

</body>
</html>
